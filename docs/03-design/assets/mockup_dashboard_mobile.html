<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390">
<title>ArkaDex — My Collection</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px; overflow: hidden;
    background: #0D0A0A;
    font-family: -apple-system, 'Inter', sans-serif;
    color: #F8FAFC;
  }

  /* Status Bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 8px;
    font-size: 15px; font-weight: 600;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; fill: #F8FAFC; }

  /* Header */
  .page-header { padding: 8px 20px 16px; }
  .page-header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  .page-header .subtitle { font-size: 13px; color: #94A3B8; margin-top: 2px; }

  /* Set Header */
  .set-header {
    margin: 0 16px 14px;
    background: rgba(28, 18, 18, 0.85);
    border: 1px solid rgba(192, 37, 46, 0.2);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .set-header-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .set-name { font-size: 14px; font-weight: 600; }
  .set-count { font-size: 13px; color: #94A3B8; }
  .progress-track {
    height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 13%;
    background: linear-gradient(90deg, #C0252E, #D4AF37);
    border-radius: 99px;
  }

  /* Card Grid */
  .card-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; padding: 0 16px;
  }
  .card {
    aspect-ratio: 2.5 / 3.5;
    border-radius: 10px;
    position: relative; overflow: hidden;
    cursor: pointer;
  }
  .card.owned { box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .card.not-owned {
    background: rgba(28,18,18,0.5);
    border: 2px dashed rgba(192, 37, 46, 0.25);
  }
  .card .bg {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .card .element-icon {
    width: 44px; height: 44px; opacity: 0.9;
  }
  .card .edit-btn {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px;
    background: rgba(0,0,0,0.45); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .card .edit-btn svg { width: 11px; height: 11px; stroke: rgba(255,255,255,0.7); fill: none; }
  .card .qty-badge {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.65);
    border-radius: 6px; padding: 2px 6px;
    font-size: 10px; font-weight: 700; color: #F8FAFC;
  }
  .card-label {
    font-size: 10px; font-weight: 600; color: #94A3B8;
    text-align: center; margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding: 0 2px;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 82px;
    background: rgba(18, 11, 11, 0.95);
    border-top: 1px solid rgba(192, 37, 46, 0.15);
    backdrop-filter: blur(20px);
    display: flex; justify-content: space-around; align-items: flex-start;
    padding-top: 12px;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600;
    color: #94A3B8;
    flex: 1;
  }
  .nav-item.active { color: #C0252E; }
  .nav-item svg { width: 22px; height: 22px; }

  /* Gradient backgrounds for cards */
  .grad-fire { background: linear-gradient(135deg, #ef4444, #991b1b); }
  .grad-water { background: linear-gradient(135deg, #3b82f6, #1e3a8a); }
  .grad-grass { background: linear-gradient(135deg, #22c55e, #166534); }
  .grad-lightning { background: linear-gradient(135deg, #eab308, #854d0e); }
  .grad-psychic { background: linear-gradient(135deg, #ec4899, #831843); }
</style>
</head>
